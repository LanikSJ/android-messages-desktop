name: ci

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/ci.yml
      - src/**
      - electron-builder.js
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - tsconfig.json
      - webpack.config.ts
  pull_request:
    types: [opened, synchronize, reopened, edited]
    paths:
      - .github/workflows/ci.yml
      - src/**
      - electron-builder.js
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - tsconfig.json
      - webpack.config.ts

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    environment:
      name: ci
      deployment: false

    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
          - ubuntu-latest

    env:
      NODE_VERSION: 26
      PNPM_VERSION: 11

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup pnpm
        run: npm install -g pnpm@${{ env.PNPM_VERSION }}

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update -y &&
          sudo apt-get install --no-install-recommends -y libopenjp2-tools rpm libarchive-tools

      - name: Install Dependencies
        run: |
          pnpm clean --lockfile
          pnpm install --no-frozen-lockfile

      - name: Build Packages
        run: pnpm run dist --publish never

      - name: Upload Build and Package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.os }}-${{ env.NODE_VERSION }}
          path: ./dist
