name: Refresh Lockfile

on:
  schedule:
    # Run every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  pull_request:
    paths:
      - ".github/workflows/refresh-lockfile.yml"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-lockfile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  refresh:
    name: Refresh Lockfile
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: 26
      PNPM_VERSION: 11

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate
          echo "pnpm version: $(pnpm -v)"

      - name: Refresh Lockfile
        run: |
          pnpm clean --lockfile
          pnpm install --no-frozen-lockfile

      - name: Check for Changes
        id: check
        run: |
          if ! git diff --quiet -- pnpm-lock.yaml pnpm-workspace.yaml; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: refresh pnpm lockfile"
          title: "chore: refresh pnpm lockfile"
          body: |
            This PR was automatically generated by the weekly lockfile refresh workflow.

            It runs `pnpm clean --lockfile && pnpm install --no-frozen-lockfile` to rebuild the lockfile from a fresh resolution, which resolves any supply-chain policy
            violations (e.g. `minimumReleaseAge`) and picks up the latest compatible versions within the semver ranges specified in `package.json`.

            **Changes may include:**
            - Updated `pnpm-lock.yaml` with fresh package resolutions
            - Updated `pnpm-workspace.yaml` with new `minimumReleaseAgeExclude` entries if recently published packages violate the minimum release age policy
          branch: chore/refresh-lockfile
          base: main
          delete-branch: true
          labels: |
            dependencies
            github-actions
