name: main

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/main.yml
      - src/**
      - electron-builder.js
      - package.json
      - tsconfig.json
      - webpack.config.ts
      - yarn.lock

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - macos-latest
          - windows-latest
          - ubuntu-latest
        node-version:
          - 24
        pnpm-version:
          - 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm ${{ matrix.pnpm-version }}
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # v6.0.0
        with:
          version: ${{ matrix.pnpm-version }}
          run_install: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install Linux Dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: >
          sudo apt-get update -y &&
          sudo apt-get install --no-install-recommends -y
          libopenjp2-tools rpm libarchive-tools

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ./node_modules
          key: ${{ matrix.os }}-${{ matrix.node-version }}-${{ env.cache-name }}-${{ hashFiles('**/yarn.lock') }}
        env:
          cache-name: node-modules

      - run: sudo apt-get update -y && sudo apt-get install --no-install-recommends -y libopenjp2-tools rpm libarchive-tools
        name: Install Linux Dependencies
        if: (startsWith(matrix.os, 'ubuntu'))

      - name: Build and Publish Artifacts
        run: pnpm run dist --publish onTagOrDraft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.os }}-${{ matrix.node-version }}
          path: ./dist
